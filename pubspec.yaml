name: grammar_qa
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Functional Programming
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.1.0
  cloud_functions: ^5.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_messaging: ^15.0.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  rxdart: ^0.27.7

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  table_calendar: ^3.0.9

  # Ads & Payment
  google_mobile_ads: ^4.0.0
  in_app_purchase: ^3.1.11

  # Utils
  http: ^1.1.0
  intl: 0.20.2
  connectivity_plus: ^5.0.2

  # Notifications
  flutter_local_notifications: ^16.3.2
  timezone: ^0.9.2

  # Text to Speech
  flutter_tts: ^3.8.5

  # Share & Storage
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Admin Dashboard
  fl_chart: ^0.66.0
  data_table_2: ^2.5.10

  # Forms & Validation
  formz: ^0.6.1

  # Localization
  flutter_localizations:
    sdk: flutter

  # === NEW: Added dependencies for new features ===
  flutter_markdown_plus: ^1.0.0
  local_auth: ^2.3.0
  flutter_stripe: ^11.0.0
  agora_rtc_engine: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1

# === OVERRIDE: Force intl version ===
dependency_overrides:
  intl: 0.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lang/