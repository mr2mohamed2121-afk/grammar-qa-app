name: grammar_qa_app
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^7.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  http: ^1.2.2
  intl: ^0.20.2
  connectivity_plus: ^7.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Text to Speech
  flutter_tts: ^4.2.2

  # Share & Storage
  share_plus: ^10.1.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.0

  # Admin Dashboard
  fl_chart: ^0.70.0
  data_table_2: ^2.5.18

  # Forms & Validation
  formz: ^0.7.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lang/