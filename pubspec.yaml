name: arabic_grammar_app
description: تطبيق أستاذ النحو العربي - تعلم قواعد اللغة العربية

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.5
  firebase_messaging: ^14.7.10
  firebase_app_check: ^0.2.2
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7
  firebase_remote_config: ^4.4.7
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.6.0
  
  # UI
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.7.0
  lottie: ^2.7.0
  
  # Audio
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  
  # PDF
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.1
  
  # Storage & Cache
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Security
  local_auth: ^2.3.0
  crypto: ^3.0.3
  
  # Notifications
  flutter_local_notifications: ^16.3.3
  timezone: ^0.9.4
  
  # Live Streaming
  agora_uikit: ^1.3.7
  
  # AI
  http: ^1.1.0
  
  # Payments
  flutter_stripe: ^9.6.0
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Charts
  fl_chart: ^0.66.2
  
  # Ads
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/fonts/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700