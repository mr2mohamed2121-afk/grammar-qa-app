name: arabic_grammar_app
description: تطبيق أستاذ النحو العربي - تعلم قواعد اللغة العربية

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # local_auth packages
  local_auth: ^2.3.0
  local_auth_android: ^1.0.34
  local_auth_darwin: ^1.0.11
  local_auth_platform_interface: ^1.0.10
  
  # Universal IO
  universal_io: ^2.2.2
  
  # Payments
  in_app_purchase: ^3.2.0
  
  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_app_check: ^0.3.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  firebase_remote_config: ^5.4.0
  cloud_functions: ^5.1.0
  
  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  
  # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.5.0
  
  # UI
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.8.0
  lottie: ^3.3.0
  
  # Audio
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  
  # PDF
  pdf: ^3.13.0
  printing: ^5.15.0
  path_provider: ^2.1.5
  
  # Storage & Cache
  shared_preferences: ^2.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Security
  crypto: ^3.0.6
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  
  # Live Streaming
  agora_uikit: ^1.3.7
  
  # AI
  http: ^1.3.0
  
  # Payments
  flutter_stripe: ^10.0.0
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Charts
  fl_chart: ^0.66.2
  
  # Ads
  google_mobile_ads: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/fonts/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700